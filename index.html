<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>授業出欠・コメント収集</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif; background: #f0f4f8; min-height: 100vh; }
header { background: linear-gradient(90deg,#1a237e,#1565c0); color: #fff; padding: 16px 20px; box-shadow: 0 3px 12px rgba(0,0,0,.25); margin-bottom: 24px; display: flex; align-items: center; justify-content: space-between; }
header h1 { font-size: 18px; font-weight: 700; }
header .sub { font-size: 13px; opacity: .8; margin-top: 2px; }
.mode-btns button { padding: 6px 16px; border-radius: 20px; border: 2px solid rgba(255,255,255,.5); background: transparent; color: #fff; cursor: pointer; font-size: 13px; font-weight: 600; margin-left: 6px; }
.mode-btns button.active { background: rgba(255,255,255,.25); }
.container { max-width: 560px; margin: 0 auto; padding: 0 16px 80px; }
.container.wide { max-width: 860px; }
.card { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,.08); margin-bottom: 16px; }
.field { margin-bottom: 16px; }
.field label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; }
.field .hint { font-size: 11px; color: #999; margin-left: 6px; font-weight: 400; }
.field .err { font-size: 12px; color: #e53935; margin-top: 4px; }
input[type=text], input[type=password], textarea {
  width: 100%; padding: 12px 14px; border: 2px solid #e0e0e0; border-radius: 8px;
  font-size: 16px; font-family: inherit; transition: border-color .2s;
  -webkit-appearance: none; appearance: none;
}
input[type=text]:focus, input[type=password]:focus, textarea:focus {
  outline: none; border-color: #1565c0;
}
input.err-input { border-color: #e53935; background: #fff5f5; }
textarea { resize: vertical; min-height: 120px; }
.btn { display: inline-block; padding: 10px 20px; border-radius: 8px; border: none; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
.btn-full { width: 100%; padding: 14px; font-size: 16px; }
.btn-blue { background: #1565c0; }
.btn-gray { background: #546e7a; }
.btn-red { background: #b71c1c; }
.btn-dark { background: #37474f; }
.char-counter { font-size: 12px; margin-top: 4px; }
.phase-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid #e0e0e0; padding: 8px 16px; display: flex; justify-content: center; gap: 6px; z-index: 100; }
.phase-dot { padding: 4px 10px; border-radius: 20px; font-size: 11px; background: #eee; color: #aaa; }
.phase-dot.active { background: #1565c0; color: #fff; font-weight: 700; }
.success-card { text-align: center; padding: 40px 20px; }
.success-card .icon { font-size: 56px; margin-bottom: 16px; }
.success-card h2 { font-size: 22px; color: #2e7d32; margin-bottom: 8px; }
.success-card p { color: #666; font-size: 15px; }
.success-card .countdown { color: #aaa; font-size: 13px; margin-top: 20px; }
.phase-card { border-top: 4px solid #1565c0; }
.phase-card h2 { font-size: 20px; margin-bottom: 20px; }
.locked-card { text-align: center; padding: 40px 20px; }
.locked-card .icon { font-size: 52px; margin-bottom: 16px; }
.tab-bar { display: flex; gap: 4px; margin-bottom: 24px; border-bottom: 2px solid #eee; }
.tab-bar button { padding: 10px 20px; border: none; border-bottom: 3px solid transparent; background: none; color: #888; cursor: pointer; font-size: 14px; font-weight: 600; font-family: inherit; margin-bottom: -2px; }
.tab-bar button.active { border-bottom-color: #1565c0; color: #1565c0; }
.phase-btns { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
.phase-btns button { padding: 8px 14px; border-radius: 20px; border: 2px solid #ddd; background: #fff; color: #555; cursor: pointer; font-size: 13px; font-weight: 600; font-family: inherit; }
.phase-btns button.active { border-color: #1565c0; background: #1565c0; color: #fff; }
.current-phase { padding: 10px 14px; background: #e3f2fd; border-radius: 8px; font-size: 14px; color: #1565c0; margin-bottom: 24px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { padding: 8px 10px; text-align: left; white-space: nowrap; background: #37474f; color: #fff; }
td { padding: 8px 10px; border-bottom: 1px solid #f0f0f0; }
tr:nth-child(even) td { background: #fafafa; }
.past-session-item { padding: 12px 16px; border-radius: 8px; border: 2px solid #eee; cursor: pointer; margin-bottom: 8px; background: #fafafa; }
.past-session-item.active { border-color: #1565c0; background: #e3f2fd; }
.past-session-item .title { font-weight: 600; font-size: 14px; }
.past-session-item .date { font-size: 12px; color: #888; margin-top: 2px; }
.info-box { padding: 12px 16px; background: #e8f5e9; border-radius: 8px; font-size: 13px; color: #2e7d32; margin-bottom: 16px; }
.warn-box { padding: 14px 16px; background: #fff8e1; border-left: 4px solid #f9a825; border-radius: 4px; margin-bottom: 20px; font-size: 13px; }
.reset-box { padding: 14px; background: #ffebee; border-radius: 8px; }
.spinner { text-align: center; padding: 40px; font-size: 24px; }
.err-box { text-align: center; padding: 30px 20px; }
.err-box .icon { font-size: 40px; margin-bottom: 12px; }
</style>
</head>
<body>

<header>
  <div>
    <h1>🎓 授業出欠・コメント収集</h1>
    <div class="sub" id="header-sub"></div>
  </div>
  <div class="mode-btns" id="mode-btns"></div>
</header>

<div id="app"></div>

<div class="phase-bar" id="phase-bar" style="display:none"></div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbwbhtHIw1QtqFytvGltLqOAmBjURSRhgjmb-nipPlVDOiF1e_QLrxRbpgOWecezr5kNtw/exec";
const ADMIN_PASS = "teacher2025";

const phases = [
  {key:"arrive",    label:"📋 授業開始（出欠）"},
  {key:"comment1",  label:"💬 コメント①"},
  {key:"comment2",  label:"📝 コメント②"},
  {key:"impression",label:"🎓 感想（授業終了）"},
  {key:"closed",    label:"🔒 受付終了"},
];

// ── URL判定 ──────────────────────────────────────────
const urlParam = new URLSearchParams(window.location.search).get("mode");
const locked = urlParam === "student" || urlParam === "admin";
let currentMode = urlParam === "admin" ? "admin" : "student";
let session = null;
let pollTimer = null;
let isSubmitting = false; // 送信中はポーリングで画面を上書きしない
let isEditing = false;   // 入力中はポーリングで画面を上書きしない

// ── GAS通信 ──────────────────────────────────────────
async function gasPost(action, data) {
  const res = await fetch(GAS_URL, {
    method: "POST",
    headers: {"Content-Type":"text/plain"},
    body: JSON.stringify({action, ...data})
  });
  return res.json();
}

async function gasGet(params) {
  const q = new URLSearchParams(params).toString();
  const res = await fetch(GAS_URL + "?" + q);
  return res.json();
}

function toJST() {
  return new Date().toLocaleString("ja-JP", {timeZone:"Asia/Tokyo"});
}

function countChars(s) {
  return (s||"").replace(/\s/g,"").length;
}

// ── ヘッダー更新 ──────────────────────────────────────
function updateHeader() {
  document.getElementById("header-sub").textContent = session ? session.title : "";
  const modeBtns = document.getElementById("mode-btns");
  if (locked) { modeBtns.innerHTML = ""; return; }
  modeBtns.innerHTML = `
    <button onclick="setMode('student')" class="${currentMode==='student'?'active':''}">学生</button>
    <button onclick="setMode('admin')" class="${currentMode==='admin'?'active':''}">教員</button>
  `;
}

function setMode(m) {
  currentMode = m;
  updateHeader();
  render();
}

// ── メイン描画 ──────────────────────────────────────
function render() {
  updateHeader();
  const app = document.getElementById("app");
  app.className = "container" + (currentMode === "admin" ? " wide" : "");
  if (currentMode === "student") {
    renderStudent();
  } else {
    renderAdmin();
  }
}

// ── 学生側 ──────────────────────────────────────────
function startStudentPolling() {
  if (urlParam !== "student") return;
  fetchCurrentSession();
  // ポーリングなし：ページ読み込み時に1回だけ取得
}

async function fetchCurrentSession() {
  try {
    const r = await gasGet({action:"currentSession"});
    if (r && r.sessionId) {
      session = {id: r.sessionId, title: r.title, phase: r.phase};
    } else {
      session = null;
    }
    if (currentMode === "student" && !isSubmitting && !isEditing) renderStudent();
    updateHeader();
  } catch(e) { console.error(e); }
}

function renderStudent() {
  const app = document.getElementById("app");
  const bar = document.getElementById("phase-bar");

  if (!session || session.phase === "closed") {
    bar.style.display = "none";
    app.innerHTML = `<div class="card locked-card">
      <div class="icon">🔒</div>
      <h2 style="color:#555;font-size:20px">現在は受付していません</h2>
      <p style="color:#999;margin-top:8px">先生の指示に従ってください</p>
    </div>`;
    return;
  }

  // フェーズバー
  const phaseDots = ["arrive","comment1","comment2","impression"].map(k => {
    const p = phases.find(x=>x.key===k);
    return `<div class="phase-dot ${session.phase===k?'active':''}">${p.label}</div>`;
  }).join("");
  bar.style.display = "flex";
  bar.innerHTML = phaseDots + `<button onclick="window.location.reload()" style="padding:4px 10px;border-radius:20px;border:1px solid #ccc;background:#fff;font-size:11px;cursor:pointer;margin-left:4px">🔄</button>`;

  if (session.phase === "arrive")     renderArriveForm(app);
  else if (session.phase === "comment1") renderCommentForm(app, "comment1");
  else if (session.phase === "comment2") renderCommentForm(app, "comment2");
  else if (session.phase === "impression") renderImpressionForm(app);
}

function studentFieldsHTML(idPrefix) {
  return `
    <div class="field">
      <label>学籍番号 <span class="hint">※半角数字のみ（例: 20250001）</span></label>
      <input type="text" id="${idPrefix}-sid" inputmode="numeric" maxlength="10" placeholder="20250001" autocomplete="off"
        onfocus="isEditing=true" onblur="isEditing=false">
      <div class="err" id="${idPrefix}-sid-err"></div>
    </div>
    <div class="field">
      <label>氏名</label>
      <input type="text" id="${idPrefix}-name" maxlength="30" placeholder="山田太郎" autocomplete="off"
        onfocus="isEditing=true" onblur="isEditing=false">
      <div class="err" id="${idPrefix}-name-err"></div>
    </div>
  `;
}

function validateStudentFields(idPrefix) {
  const sid = document.getElementById(`${idPrefix}-sid`).value.trim();
  const name = document.getElementById(`${idPrefix}-name`).value.trim();
  let ok = true;
  if (!sid || sid.length < 4) {
    document.getElementById(`${idPrefix}-sid-err`).textContent = "学籍番号は4文字以上で入力してください";
    document.getElementById(`${idPrefix}-sid`).classList.add("err-input");
    ok = false;
  } else {
    document.getElementById(`${idPrefix}-sid-err`).textContent = "";
    document.getElementById(`${idPrefix}-sid`).classList.remove("err-input");
  }
  if (!name || name.length < 2) {
    document.getElementById(`${idPrefix}-name-err`).textContent = "氏名を正しく入力してください";
    document.getElementById(`${idPrefix}-name`).classList.add("err-input");
    ok = false;
  } else {
    document.getElementById(`${idPrefix}-name-err`).textContent = "";
    document.getElementById(`${idPrefix}-name`).classList.remove("err-input");
  }
  return ok ? {sid, name} : null;
}

function showSuccess(app, icon, msg, sub) {
  let count = 5;
  app.innerHTML = `<div class="card success-card">
    <div class="icon">${icon}</div>
    <h2>${msg}</h2>
    <p>${sub}</p>
    <p class="countdown" id="countdown">${count}秒後に次の画面に切り替わります...</p>
  </div>`;
  const t = setInterval(() => {
    count--;
    const el = document.getElementById("countdown");
    if (el) el.textContent = `${count}秒後に次の画面に切り替わります...`;
    if (count <= 0) { clearInterval(t); window.location.reload(); }
  }, 1000);
}

function renderArriveForm(app) {
  app.innerHTML = `<div class="card phase-card" style="border-top-color:#1565c0">
    <h2>📋 授業開始 出席確認</h2>
    ${studentFieldsHTML("arrive")}
    <button class="btn btn-blue btn-full" id="arrive-submit">出席を登録する</button>
    <div class="err" id="arrive-general-err" style="margin-top:8px"></div>
  </div>`;

  document.getElementById("arrive-submit").addEventListener("click", async () => {
    const vals = validateStudentFields("arrive");
    if (!vals) return;
    isSubmitting = true;
    document.getElementById("arrive-submit").textContent = "送信中...";
    document.getElementById("arrive-submit").disabled = true;
    try {
      const r = await gasPost("submit", {sessionId:session.id, studentId:vals.sid, name:vals.name, type:"arrive", text:"", timestamp:toJST()});
      if (r.status === "duplicate") {
        document.getElementById("arrive-sid-err").textContent = "この学籍番号はすでに出欠登録されています";
        document.getElementById("arrive-submit").textContent = "出席を登録する";
        document.getElementById("arrive-submit").disabled = false;
        return;
      }
      showSuccess(app, "✅", "出席を記録しました", `${vals.sid} ${vals.name}`);
    } catch(e) {
      document.getElementById("arrive-general-err").textContent = "エラー: " + e.message;
      document.getElementById("arrive-submit").textContent = "出席を登録する";
      document.getElementById("arrive-submit").disabled = false;
    }
  });
}

function renderCommentForm(app, phase) {
  const meta = {
    comment1: {label:"コメント①", color:"#4527a0", icon:"💬"},
    comment2: {label:"コメント②", color:"#00695c", icon:"📝"}
  };
  const m = meta[phase];
  const pfx = phase; // comment1 or comment2
  app.innerHTML = `<div class="card phase-card" style="border-top-color:${m.color}">
    <h2>${m.icon} ${m.label}</h2>
    ${studentFieldsHTML(pfx)}
    <div class="field">
      <label>コメント内容</label>
      <textarea id="${pfx}-text" rows="5" placeholder="今日の授業の内容について記入してください..." onfocus="isEditing=true" onblur="isEditing=false"></textarea>
      <div class="char-counter" id="${pfx}-counter" style="color:#aaa">0字（30字以上推奨）</div>
      <div class="err" id="${pfx}-text-err"></div>
    </div>
    <button class="btn btn-full" id="${pfx}-submit" style="background:${m.color}">送信する</button>
    <div class="err" id="${pfx}-general-err" style="margin-top:8px"></div>
  </div>`;

  document.getElementById(`${pfx}-text`).addEventListener("input", e => {
    const n = countChars(e.target.value);
    const el = document.getElementById(`${pfx}-counter`);
    el.textContent = `${n}字（30字以上推奨）`;
    el.style.color = n >= 30 ? "#2e7d32" : n > 0 ? "#f57c00" : "#aaa";
  });

  document.getElementById(`${pfx}-submit`).addEventListener("click", async () => {
    const vals = validateStudentFields(pfx);
    if (!vals) return;
    const text = document.getElementById(`${pfx}-text`).value;
    if (countChars(text) < 1) {
      document.getElementById(`${pfx}-text-err`).textContent = "コメントを入力してください";
      return;
    }
    document.getElementById(`${pfx}-text-err`).textContent = "";
    isSubmitting = true;
    document.getElementById(`${pfx}-submit`).textContent = "送信中...";
    document.getElementById(`${pfx}-submit`).disabled = true;
    try {
      await gasPost("submit", {sessionId:session.id, studentId:vals.sid, name:vals.name, type:phase, text, timestamp:toJST(), charCount:countChars(text)});
      showSuccess(app, "✅", `${m.label}を送信しました`, `${vals.sid} ${vals.name}｜${countChars(text)}字`);
    } catch(e) {
      document.getElementById(`${pfx}-general-err`).textContent = "エラー: " + e.message;
      document.getElementById(`${pfx}-submit`).textContent = "送信する";
      document.getElementById(`${pfx}-submit`).disabled = false;
    }
  });
}

function renderImpressionForm(app) {
  app.innerHTML = `<div class="card phase-card" style="border-top-color:#e65100">
    <h2>🎓 授業終了 感想・出席確認</h2>
    ${studentFieldsHTML("imp")}
    <div class="field">
      <label>今日の授業の感想</label>
      <textarea id="imp-text" rows="6" style="min-height:140px" placeholder="今日の授業全体を通じての感想・学びを記入してください..." onfocus="isEditing=true" onblur="isEditing=false"></textarea>
      <div class="char-counter" id="imp-counter" style="color:#aaa">0字（50字以上推奨）</div>
      <div class="err" id="imp-text-err"></div>
    </div>
    <button class="btn btn-full" id="imp-submit" style="background:#e65100">感想を送信する（出席確定）</button>
    <div class="err" id="imp-general-err" style="margin-top:8px"></div>
  </div>`;

  document.getElementById("imp-text").addEventListener("input", e => {
    const n = countChars(e.target.value);
    const el = document.getElementById("imp-counter");
    el.textContent = `${n}字（50字以上推奨）`;
    el.style.color = n >= 50 ? "#2e7d32" : n > 0 ? "#f57c00" : "#aaa";
  });

  document.getElementById("imp-submit").addEventListener("click", async () => {
    const vals = validateStudentFields("imp");
    if (!vals) return;
    const text = document.getElementById("imp-text").value;
    if (countChars(text) < 1) {
      document.getElementById("imp-text-err").textContent = "感想を入力してください";
      return;
    }
    document.getElementById("imp-text-err").textContent = "";
    isSubmitting = true;
    document.getElementById("imp-submit").textContent = "送信中...";
    document.getElementById("imp-submit").disabled = true;
    try {
      await gasPost("submit", {sessionId:session.id, studentId:vals.sid, name:vals.name, type:"impression", text, timestamp:toJST(), charCount:countChars(text)});
      showSuccess(app, "🎓", "感想を送信しました（授業終了の出席記録）", `${vals.sid} ${vals.name}｜${countChars(text)}字`);
    } catch(e) {
      document.getElementById("imp-general-err").textContent = "エラー: " + e.message;
      document.getElementById("imp-submit").textContent = "感想を送信する（出席確定）";
      document.getElementById("imp-submit").disabled = false;
    }
  });
}

// ── 教員側 ──────────────────────────────────────────
let adminAuthed = false;
let adminTab = "current";
let pastSessions = [];
let viewSession = null;
let summaryData = [];

function renderAdmin() {
  const app = document.getElementById("app");
  document.getElementById("phase-bar").style.display = "none";

  if (!adminAuthed) {
    app.innerHTML = `<div class="card">
      <h2 style="margin-bottom:20px;font-size:20px">🔐 教員管理画面</h2>
      <div class="field">
        <label>パスワード</label>
        <input type="password" id="admin-pass" placeholder="パスワードを入力">
      </div>
      <button class="btn btn-dark" id="admin-login">ログイン</button>
      <p style="font-size:12px;color:#aaa;margin-top:12px">※デフォルト: teacher2025</p>
    </div>`;
    document.getElementById("admin-pass").addEventListener("keydown", e => {
      if (e.key === "Enter") doAdminLogin();
    });
    document.getElementById("admin-login").addEventListener("click", doAdminLogin);
    return;
  }

  app.innerHTML = `<div class="card" style="max-width:820px;margin:0 auto">
    <h2 style="margin-bottom:16px;font-size:22px">📊 教員管理画面</h2>
    <div class="tab-bar">
      <button id="tab-current" class="${adminTab==='current'?'active':''}" onclick="switchTab('current')">📡 現在の授業</button>
      <button id="tab-past" class="${adminTab==='past'?'active':''}" onclick="switchTab('past')">📚 過去の授業</button>
    </div>
    <div id="tab-content"></div>
  </div>`;

  renderTabContent();
}

function doAdminLogin() {
  const pass = document.getElementById("admin-pass").value;
  if (pass === ADMIN_PASS) {
    adminAuthed = true;
    // 教員側はlocalStorageからセッション読み込み
    try {
      const d = JSON.parse(localStorage.getItem("attendance_session_v2") || "null");
      if (d) session = d;
    } catch(e) {}
    render();
  } else {
    alert("パスワードが違います");
  }
}

function switchTab(tab) {
  adminTab = tab;
  if (tab === "past") loadPastSessions();
  renderTabContent();
  document.querySelectorAll(".tab-bar button").forEach(b => b.classList.remove("active"));
  document.getElementById(`tab-${tab}`).classList.add("active");
}

function renderTabContent() {
  const el = document.getElementById("tab-content");
  if (!el) return;
  if (adminTab === "current") renderCurrentTab(el);
  else renderPastTab(el);
}

function renderCurrentTab(el) {
  let html = "";

  if (!session) {
    html += `<div style="margin-bottom:24px;padding:16px;background:#f5f5f5;border-radius:8px">
      <h3 style="margin-bottom:12px;font-size:16px">新しい授業を開始</h3>
      <input type="text" id="session-title" placeholder="授業名（例: 臨床心理学 第3回）" style="margin-bottom:8px">
      <button class="btn btn-blue" id="create-session-btn">授業を開始する</button>
    </div>`;
  } else {
    const phaseLabel = phases.find(p=>p.key===session.phase)?.label || "";
    html += `<div style="margin-bottom:24px">
      <h3 style="margin-bottom:10px;font-size:16px">📡 授業: ${session.title}</h3>
      <div class="phase-btns" id="phase-btns">
        ${phases.map(p=>`<button class="${session.phase===p.key?'active':''}" onclick="changePhase('${p.key}')">${p.label}</button>`).join("")}
      </div>
      <div class="current-phase">現在の受付：<strong>${phaseLabel}</strong></div>
    </div>`;
    html += summaryTableHTML();
    html += `<div class="info-box">📊 データはGoogleスプレッドシートに自動保存されています。</div>`;
  }

  html += `<div style="margin-top:24px;border-top:1px solid #eee;padding-top:16px">
    <button class="btn btn-red" style="font-size:12px" id="reset-btn">⚠️ セッションをリセット</button>
    <div id="reset-confirm" style="display:none;margin-top:12px;padding:14px;background:#ffebee;border-radius:8px">
      <p style="color:#b71c1c;font-weight:600;margin-bottom:8px">現在の授業セッションをリセットしますか？</p>
      <p style="font-size:12px;color:#888;margin-bottom:10px">※スプレッドシートのデータは残ります</p>
      <button class="btn btn-red" style="margin-right:8px" id="reset-confirm-btn">リセットする</button>
      <button class="btn btn-gray" id="reset-cancel-btn">キャンセル</button>
    </div>
  </div>`;

  el.innerHTML = html;

  if (!session) {
    document.getElementById("create-session-btn").addEventListener("click", createSession);
  } else {
    loadSummary(session.id);
    document.getElementById("reset-btn").addEventListener("click", () => {
      document.getElementById("reset-confirm").style.display = "block";
    });
    document.getElementById("reset-confirm-btn").addEventListener("click", () => {
      session = null;
      localStorage.removeItem("attendance_session_v2");
      updateHeader();
      renderTabContent();
    });
    document.getElementById("reset-cancel-btn").addEventListener("click", () => {
      document.getElementById("reset-confirm").style.display = "none";
    });
  }
}

function summaryTableHTML() {
  if (summaryData.length === 0) {
    return `<div style="padding:16px;color:#aaa;text-align:center" id="summary-area">
      <div style="margin-bottom:8px">読み込み中...</div>
    </div>`;
  }
  const rows = summaryData.map((s,i) => `<tr>
    <td>${s.studentId}</td>
    <td>${s.name}</td>
    <td style="color:${s.arrive?'#2e7d32':'#b71c1c'}">${s.arrive?"✓":"—"}</td>
    <td style="color:${s.c1>0?'#4527a0':'#aaa'}">${s.c1||"—"}</td>
    <td style="color:${s.c2>0?'#00695c':'#aaa'}">${s.c2||"—"}</td>
    <td style="color:${s.imp>0?'#e65100':'#aaa'}">${s.imp||"—"}</td>
  </tr>`).join("");

  return `<div>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
      <h3 style="margin:0;font-size:16px">👥 提出状況（${summaryData.length}名）</h3>
      <button class="btn btn-gray" style="padding:5px 12px;font-size:12px" id="refresh-btn">🔄 更新</button>
    </div>
    <div style="overflow-x:auto;margin-bottom:20px">
      <table>
        <thead><tr>
          ${["学籍番号","氏名","出欠(開始)","コメント①字数","コメント②字数","感想字数"].map(h=>`<th>${h}</th>`).join("")}
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
}

async function loadSummary(sessionId) {
  try {
    const r = await gasGet({action:"summary", sessionId});
    if (r.rows) {
      summaryData = r.rows;
      renderTabContent();
      // 更新ボタンのイベント再設定
      const btn = document.getElementById("refresh-btn");
      if (btn) btn.addEventListener("click", () => loadSummary(sessionId));
    }
  } catch(e) { console.error(e); }
}

async function createSession() {
  const title = document.getElementById("session-title").value.trim();
  if (!title) return;
  const id = "S" + Date.now().toString(36).toUpperCase();
  session = {id, title, phase:"arrive", createdAt: toJST()};
  localStorage.setItem("attendance_session_v2", JSON.stringify(session));
  updateHeader();
  try { await gasPost("createSession", {sessionId:id, title, createdAt:session.createdAt}); } catch(e) {}
  summaryData = [];
  renderTabContent();
}

async function changePhase(phase) {
  session.phase = phase;
  localStorage.setItem("attendance_session_v2", JSON.stringify(session));
  summaryData = [];
  renderTabContent();
  try { await gasPost("updatePhase", {sessionId:session.id, phase}); } catch(e) {}
  loadSummary(session.id);
}

async function loadPastSessions() {
  try {
    const r = await gasGet({action:"allSessions"});
    if (r.sessions) { pastSessions = r.sessions; renderTabContent(); }
  } catch(e) { console.error(e); }
}

function renderPastTab(el) {
  let html = `<h3 style="margin-bottom:12px;font-size:16px">過去の授業一覧</h3>`;
  if (pastSessions.length === 0) {
    html += `<p style="color:#aaa">読み込み中...</p>`;
  } else {
    html += pastSessions.map(s => `
      <div class="past-session-item ${viewSession?.sessionId===s.sessionId?'active':''}"
        onclick="selectPastSession('${s.sessionId}','${s.title}','${s.createdAt}')">
        <div class="title">${s.title}</div>
        <div class="date">${s.createdAt}</div>
      </div>`).join("");
  }
  if (viewSession) {
    html += `<h3 style="margin:16px 0 10px;font-size:16px">📋 ${viewSession.title}</h3>`;
    html += summaryTableHTML();
  }
  el.innerHTML = html;
  if (viewSession) {
    const btn = document.getElementById("refresh-btn");
    if (btn) btn.addEventListener("click", () => selectPastSession(viewSession.sessionId, viewSession.title, viewSession.createdAt));
  }
}

async function selectPastSession(sessionId, title, createdAt) {
  viewSession = {sessionId, title, createdAt};
  summaryData = [];
  renderTabContent();
  try {
    const r = await gasGet({action:"summary", sessionId});
    if (r.rows) { summaryData = r.rows; renderTabContent(); }
  } catch(e) {}
}

// ── 初期化 ──────────────────────────────────────────
if (urlParam === "student") {
  startStudentPolling();
} else if (urlParam === "admin") {
  // 教員モードはlocalStorageから自動ログインしない（パスワード必須）
}

render();
</script>

</html>
